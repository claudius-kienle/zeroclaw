{{- if .Values.signalCli.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "zeroclaw.fullname" . }}-signal-cli
  labels:
    {{- include "zeroclaw.labels" . | nindent 4 }}
    app.kubernetes.io/component: signal-cli
  {{- with .Values.signalCli.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.signalCli.service.type }}
  ports:
    - port: {{ .Values.signalCli.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "zeroclaw.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: signal-cli
{{- end }}
