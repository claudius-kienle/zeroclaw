{{- if .Values.signalCli.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zeroclaw.fullname" . }}-signal-cli
  labels:
    {{- include "zeroclaw.labels" . | nindent 4 }}
    app.kubernetes.io/component: signal-cli
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "zeroclaw.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: signal-cli
  template:
    metadata:
      labels:
        {{- include "zeroclaw.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: signal-cli
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
      containers:
        - name: signal-cli-rest-api
          image: "{{ .Values.signalCli.image.repository }}:{{ .Values.signalCli.image.tag }}"
          imagePullPolicy: {{ .Values.signalCli.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8686
              protocol: TCP
          env:
            - name: MODE
              value: {{ .Values.signalCli.mode | quote }}
          volumeMounts:
            - name: data
              mountPath: /home/.local/share/signal-cli
              subPath: signal-cli
          {{- with .Values.signalCli.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.signalCli.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.signalCli.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.signalCli.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.signalCli.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.signalCli.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.signalCli.probes.liveness.failureThreshold }}
          {{- end }}
          {{- if .Values.signalCli.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.signalCli.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.signalCli.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.signalCli.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.signalCli.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.signalCli.probes.readiness.failureThreshold }}
          {{- end }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "zeroclaw.pvcName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.signalCli.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.signalCli.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.signalCli.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
